name: CI

on:
  push:
  pull_request:

jobs:
  fixture-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install locked fixture tooling
        run: python -m pip install -c constraints-pdf-fixtures.txt -e ".[dev,fixtures]"
      - name: Compile fixture generators
        run: >-
          python -m py_compile
          tests/fixtures/build_pdf_merged_table_libreoffice_fixture.py
          tests/fixtures/build_pdf_table_continuation_fixture.py
          scripts/update_pdf_continuation_visual_fixture.py
      - name: Test fixture toolchain guards
        run: pytest tests/test_fixture_tooling.py
      - name: Verify deterministic PDF continuation fixture
        run: |
          python tests/fixtures/build_pdf_table_continuation_fixture.py
          git diff --exit-code -- tests/fixtures/pdf_table_continuation.pdf

  evaluation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install evaluation dependencies
        run: python -m pip install -c constraints-pdf-fixtures.txt -e ".[dev]"
      - name: Run evaluation quality gate
        run: python -m spectrail evaluate eval/cases --output outputs/evaluation
      - name: Run real-world PDF corpus quality gate
        if: always()
        run: >-
          python -m spectrail evaluate-pdf-corpus
          eval/pdf_corpus_v1/manifest.json
          --output outputs/pdf-corpus
      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: |
            outputs/evaluation
            outputs/pdf-corpus
          if-no-files-found: warn

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install -c constraints-pdf-fixtures.txt -e ".[dev]"
      - name: Run deterministic release smoke pipelines
        run: |
          python -m spectrail extract docs/sample_srs.md --model-mode mock --output outputs/demo
          python -m spectrail extract eval/cases/sample_srs_long/document.md --model-mode mock --chunking force --max-rendered-prompt-chars 4000 --overlap-blocks 1 --output outputs/demo-chunked
          python -m spectrail extract docs/sample_srs.md --model-mode recorded --recorded-fixture fixtures/recorded/sample_srs_reqir_response_full.json --output outputs/demo-recorded-full
          python -m spectrail extract docs/sample_srs.md --model-mode recorded --recorded-fixture fixtures/recorded/sample_srs_live_deepseek_response.json --output outputs/demo-sanitized-live
      - name: Re-run validation
        run: python -m spectrail validate outputs/demo/extracted/reqir.raw.json --blocks outputs/demo/parsed/blocks.json --output outputs/demo/extracted/validation_report.json
      - name: Run tests
        run: pytest
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Install browser for visual acceptance
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run frontend visual acceptance
        working-directory: frontend
        run: npm run test:visual
      - name: Upload frontend visual diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-results
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
      - name: Build frontend
        working-directory: frontend
        run: npm run build
