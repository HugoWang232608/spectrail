name: Update frontend visual baselines

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-baselines:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install browser for visual acceptance
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Generate Linux visual baselines
        working-directory: frontend
        run: npm run test:visual:update
      - name: Upload visual baselines
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-baselines-linux
          path: frontend/tests/visual/__screenshots__
          if-no-files-found: error
